<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="img">
        <img src="../imagenes/libro1.jpg" alt="" id="img">
    </div>
    <input type="file" id="getimg" onchange="cambioimg()">
    <script>
        function cambioimg(){
            let p = document.getElementById("getimg").files[0];
            document.getElementById("img").src = URL.createObjectURL(p);
        }
    </script>
</body>
</html>
