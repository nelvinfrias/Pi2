<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <figure>
        <img src="../imagenes/libro1.jpg" alt="" id="imge1">
    </figure>
    <input type="file" id="getimg" onclick="cambioimg()">

    <script>
        function cambioimg(){
            const file = document.getElementById("getimg");
            file.onchange = () => {
                imge1.src = URL.createObjectURL(file.files[0])
            }
        }
    </script>
</body>
</html>
