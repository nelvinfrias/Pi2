<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Supabase App</title>
</head>
<body>

  <h2>Registro</h2>

  <input type="text" id="nombre" placeholder="Nombre">
  <br><br>
  <input type="email" id="email" placeholder="Correo">
  <br><br>
  <input type="password" id="password" placeholder="Contraseña">
  <br><br>
  <button onclick="registrar()">Registrarse</button>

  <h2>Login</h2>

  <input type="email" id="loginEmail" placeholder="Correo">
  <br><br>
  <input type="password" id="loginPassword" placeholder="Contraseña">
  <br><br>
  <button onclick="login()">Iniciar sesión</button>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://gmduotzsjpvppqhzsbpa.supabase.co'
    const supabaseKey = 'sb_publishable_uxHX-XO8lDhLaso9IcPujA_jLHfHKkU'

    const supabase = createClient(supabaseUrl, supabaseKey)

    // GUARDAR EN TABLA
    async function guardarNombre(user, nombre) {
      const { data, error } = await supabase
        .from('Registro') // 👈 TU TABLA
        .insert([
          {
            user_id: user.id,
            nombre: nombre
          }
        ])

      console.log("INSERT DATA:", data)
      console.log("INSERT ERROR:", error)

      if (error) {
        alert("Error al guardar en tabla: " + error.message)
      } else {
        alert("Datos guardados correctamente")
      }
    }

    // REGISTRO
    window.registrar = async function () {
      const nombre = document.getElementById("nombre").value
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value

      const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password
      })

      console.log("SIGNUP DATA:", data)
      console.log("SIGNUP ERROR:", error)

      if (error) {
        alert("Error: " + error.message)
        return
      }

      if (!data.user) {
        alert("No se pudo obtener el usuario (revisa confirmación de email)")
        return
      }

      await guardarNombre(data.user, nombre)
    }
