<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library iBooks - Perfil</title>
    <link rel="stylesheet" href="estilos-perfil.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <header class="barra-superior">
        <h1 class="titulox">
            <a href="main_web.html" class="btn-regresar">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            Library iBooks.com
        </h1>
    </header>

    <div class="perfil">

        <div class="foto">
        <img id="fotoPerfil" src="../img_pb/imgpre.jpeg">
        <h2 id="nombreUsuario" class="nombre-usuario">Usuario</h2>
        </div>
         <label class="btn-cargar" for="inputFoto">Cambiar Foto</label>
        <input type="file" name="fotoPerfil" id="inputFoto" accept="image/*" onchange="cargarImagen(event)">

        <div class="descripcion">

            <p id="mostrarDescripcion">
                Escribe tu descripción
            </p>

            <div class="botones">
                <button onclick="abrirEditarPerfil()">
                    Editar perfil
                </button>
            </div>

        </div>

    </div>

    <div class="contenedor-abajo">

        <div class="categorias">
            <h3>Categorías favoritas</h3>
            <p>• Programación</p>
            <p>• Matemáticas avanzadas</p>
        </div>

        <div class="repost">
            <h3>Reposts</h3>
            <p>Aquí van tus publicaciones compartidas</p>
        </div>

    </div>

    <!-- MODAL EDITAR PERFIL -->

    <div id="modalPerfil" class="modal-perfil">

        <div class="ventana-perfil">

            <h2>Editar Perfil</h2>

            <form action="ActualizarPerfil" method="POST">

                <label>Usuario</label>
                <input type="text" name="usuario">

                <label>Contraseña actual</label>
                <input type="password" name="passActual">

                <label>Nueva contraseña</label>
                <input type="password" name="passNueva">

                <label>Confirmar nueva contraseña</label>
                <input type="password" name="passConfirmar">

                <label>Descripción</label>
                <textarea name="descripcion"></textarea>

                <div class="botones">

                    <button type="submit">
                        Guardar
                    </button>

                    <button type="button" onclick="cerrarEditarPerfil()">
                        Cancelar
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script>

        function abrirEditarPerfil() {
            document.getElementById("modalPerfil").style.display = "flex";
        }

        function cerrarEditarPerfil() {
            document.getElementById("modalPerfil").style.display = "none";
        }

    

        function cargarImagen(event) {

            const imagen = document.getElementById("fotoPerfil");

            imagen.src = URL.createObjectURL(event.target.files[0]);

        }


    </script>

</body>

</html>
