<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <link rel="stylesheet" href="../CSS/perfil.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<header class="header">
    <a href="main_web.html" class="logo">Library iBooks</a>

    <nav class="menu">
        <a href="#">Iniciar Sesion</a>
        <a href="#">Registrarse</a>
    </nav>

    <div class="search">
        <input type="text" placeholder="Buscar...">
        <i class="fa fa-search"></i>
    </div>

    <button id="toggleTema"><i class="fa-solid fa-moon"></i></button>
</header>

<div class="layout">

    <aside class="sidebar">
        <a href="main_web.html"><i class="fa-solid fa-house"></i> Inicio</a>
        <a href="perfil.html"><i class="fa-solid fa-user"></i> Perfil</a>
        <a href="#"><i class="fa-solid fa-tags"></i> Categorias</a>
        <a href="#"><i class="fa-solid fa-book"></i> Nosotros</a>
    </aside>

    <main class="main">

        <div class="perfil-header">

            <div class="perfil-img">
                <img src="../imagenes/user.jpg" id="fotoPerfil">
                <input type="file" id="inputFoto">
                <label for="inputFoto">Cambiar foto</label>
            </div>

            <div class="perfil-info">
                <h2 id="nombrePerfil">Usuario</h2>
                <p id="bioPerfil">Sin descripción...</p>

                <button onclick="mostrarEditor()">Editar perfil</button>
            </div>

        </div>

        <div class="perfil-stats">
            <div>
                <h3 id="totalPosts">0</h3>
                <span>Posts</span>
            </div>
            <div>
                <h3>0</h3>
                <span>Likes</span>
            </div>
        </div>

        <div class="formulario" id="editorPerfil">
            <input type="text" id="nombreInput" placeholder="Nombre...">
            <textarea id="bioInput" placeholder="Descripción..."></textarea>

            <div class="botons">
                <button onclick="guardarPerfil()">Guardar</button>
                <button onclick="cancelar()">Cancelar</button>
            </div>
        </div>

        <h2>Mis publicaciones</h2>
        <div class="grid-posts" id="misPosts"></div>

    </main>
</div>

<script>

const btnTema = document.getElementById("toggleTema");

if(localStorage.getItem("tema")){
    document.documentElement.setAttribute("data-theme", localStorage.getItem("tema"));
}

btnTema.addEventListener("click", () => {
    let tema = document.documentElement.getAttribute("data-theme");

    if(tema === "light"){
        document.documentElement.setAttribute("data-theme", "dark");
        localStorage.setItem("tema", "dark");
    } else {
        document.documentElement.setAttribute("data-theme", "light");
        localStorage.setItem("tema", "light");
    }
});

document.getElementById("inputFoto").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(event){
        const base64 = event.target.result;
        localStorage.setItem("fotoPerfil", base64);
        document.getElementById("fotoPerfil").src = base64;
    };

    reader.readAsDataURL(file);
});

function cargarPerfil(){
    const nombre = localStorage.getItem("nombre") || "Usuario";
    const bio = localStorage.getItem("bio") || "Sin descripción...";
    const foto = localStorage.getItem("fotoPerfil");

    document.getElementById("nombrePerfil").innerText = nombre;
    document.getElementById("bioPerfil").innerText = bio;

    if(foto){
        document.getElementById("fotoPerfil").src = foto;
    }
}

function mostrarEditor(){
    document.getElementById("editorPerfil").style.display = "flex";
}

function guardarPerfil(){
    const nombre = document.getElementById("nombreInput").value;
    const bio = document.getElementById("bioInput").value;

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("bio", bio);

    cargarPerfil();
    document.getElementById("editorPerfil").style.display = "none";
}

function cancelar(){
    document.getElementById("editorPerfil").style.display = "none";
}

function cargarPosts(){
    const contenedor = document.getElementById("misPosts");
    contenedor.innerHTML = "";

    const posts = JSON.parse(localStorage.getItem("posts")) || [];

    document.getElementById("totalPosts").innerText = posts.length;

    posts.forEach((post, index) => {
        const div = document.createElement("div");
        div.classList.add("post");

        div.innerHTML = `
            <img src="${post.imagen}">
            <h3>${post.titulo}</h3>
            <p class="texto1">${post.texto}</p>

            <div class="post-actions">
                <button onclick="eliminarPost(${index})">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
        `;

        contenedor.appendChild(div);
    });
}

function eliminarPost(index){
    if(confirm("¿Seguro que quieres eliminar este post?")){
        let posts = JSON.parse(localStorage.getItem("posts")) || [];

        posts.splice(index, 1);

        localStorage.setItem("posts", JSON.stringify(posts));

        cargarPosts();
    }
}


window.onload = () => {
    cargarPerfil();
    cargarPosts();
};

</script>

</body>
</html>
