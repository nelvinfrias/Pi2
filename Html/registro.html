<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyecto Integrador</title>
    <link rel="stylesheet" href="../CSS/usuariooficial.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<form onsubmit="event.preventDefault(); registrar();">

    <div class="caja">
        
        <div class="caja2">
        
            <div class="titulocaja">
                <i class="fa-solid fa-book-open"></i>
                <h2 class="anix">Registrate a SchoolarReviews</h2>
            </div>
            
            <div class="in">
                <input type="email" id="email" placeholder="correo" required>
                <i class="fa fa-envelope"></i> 
            </div>
           
            <div class="in">
                <input type="text" id="nombre" placeholder="Usuario" required>
                <i class="fa fa-user"></i>
            </div>

            <div class="in">
                <input type="password" id="password" placeholder="Contraseña" required>
                <i class="fa fa-lock"></i>
            </div>

            <button type="submit" class="register">Registrarse</button>

        </div>

        <div class="imagenbook">
            <img src="../imagenes/fondobarra.png">
        </div>

    </div>

</form>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://gmduotzsjpvppqhzsbpa.supabase.co'
const supabaseKey = 'sb_publishable_uxHX-XO8lDhLaso9IcPujA_jLHfHKkU'

const supabase = createClient(supabaseUrl, supabaseKey)

async function guardarNombre(user, nombre) {
  const { error } = await supabase
    .from('Registro')
    .insert([
      {
        user_id: user.id,
        nombre: nombre
      }
    ])

  if (error) {
    console.log(error)
    alert("Error guardando datos")
  } else {
    console.log("Guardado OK")
    window.location.href = "generos.html"
  }
}

window.registrar = async function () {
  const email = document.getElementById("email").value
  const nombre = document.getElementById("nombre").value
  const password = document.getElementById("password").value

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password
  })

  console.log(data, error)

  if (error) {
    alert(error.message)
    return
  }

  if (!data.user) {
    alert("No se creó el usuario")
    return
  }

  await guardarNombre(data.user, nombre)
}
</script>

</body>
</html>
