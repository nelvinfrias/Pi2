<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/main_publicar.css">
    <title>Document</title>
</head>
<body>
    <style>
        body{
            background-color: #353535;
        }
    </style>







    <div class="contenedor_publicacion">
        <figure>
            <img src="../img_pb/imgprueba.jpg" alt="" id = "img">
        </figure>
        <style>
            .contenedor_publicacion figure{
                padding: 10px;
                border-radius: 20px;
                height: 500px;
                overflow: hidden;
            }
            .contenedor_publicacion img{
                width: 100%;
                height: 100%;
                object-fit: cover;
                border-radius: 20px;
            }
        </style>
        <div class="labelfile">
            <label for="getimg">File </label>
            <style>
                .labelfile:hover{
                    transform: translateY(-5px);
                    transition: all .3s ease;
                }
                .labelfile {
                    align-items: center;
                    height: 40px;
                    width: 400px;
                }
                
            </style>
        </div>

            <style>

                .labelfile{
                    display: flex;
                    align-content: center;
                    justify-content: center;
                    background-color: #af231c;
                    margin-top: 30px;
                    margin-left: 10px;
                    width: 70px;
                    border-radius: 20px;
                    color: white;
                }
                .contenedor_publicacion{
                    background-color: white;
                }
                
            </style>

            
        <div class="info">
            <h2>info</h2>
            <textarea name="" id="" placeholder="ingresa una descripcion"></textarea>
            <style>
                textarea{
                    padding: 10px;
                }
            </style>           
        </div>
        <div class="botones_inferiores">
        <a href="main_web.html">  <button>Preview</button></a>
            <button>Upload</button>
        </div>
    </div>
    <input type="file" id="getimg" onchange="cambioimg()" class="getimg">
    <style>
        #getimg{
            display: none;
        }
    </style>
    <script>
        function cambioimg(){
            let p = document.getElementById("getimg").files[0];
            document.getElementById("img").src = URL.createObjectURL(p);
        }
    </script>
    <style>
        .contenedor_publicacion:hover {
                transform: translateY(-5px);
                transition: all .3s ease;
                box-shadow: 0px 0px 40px 0px rgba(0,0,0,0.75);
            }
    </style>
    


    




</body>
</html>
