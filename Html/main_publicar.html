<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/main_publicar.css">
    <title>Document</title>
</head>
<body>
    







    <div class="contenedor_publicacion">
        <figure>
            <img src="../img_pb/imgprueba.jpg" alt="" id = "img">
        </figure>
        <div class="labelfile">
            <label for="getimg">subir </label>
        </div>

            <style>

                .labelfile{
                    display: flex;
                    align-content: center;
                    justify-content: center;
                    background-color: #af231c;
                    margin-top: 30px;
                    margin-left: 10px;
                    width: 70px;
                    border-radius: 20px;
                    color: white;
                }
                
            </style>

            
        <div class="info">
            <h2>info</h2>
            <input type="text">
        </div>
        <div class="botones_inferiores">
          <a href="main_web.html">  <button>Preview</button></a>
            <button>Publicar</button>
        </div>
    </div>
     <input type="file" id="getimg" onchange="cambioimg()" class="getimg">
     <style>
        #getimg{
            display: none;
        }
     </style>
    <script>
        function cambioimg(){
            let p = document.getElementById("getimg").files[0];
            document.getElementById("img").src = URL.createObjectURL(p);
        }
    </script>
    


    




</body>
