<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/estilo.css">
    <title>Publicar</title>
</head>
<body>

<div class="contenedor_publicacion">

    <figure>
        <img src="../img_pb/imgprueba.jpg" id="img">
    </figure>

    <div class="labelfile">
        <label for="getimg">Subir</label>
    </div>

    <div class="info">
        <textarea id="texto" placeholder="Escribe tu reseña..."></textarea>
    </div>

    <div class="botones_inferiores">
        <a href="main_web.html"><button>Cancelar</button></a>
        <button onclick="subirPost()">Publicar</button>
    </div>

</div>

<input type="file" id="getimg" accept="image/*">

<script>
document.getElementById("getimg").addEventListener("change", function(){

    const file = this.files[0];
    if(!file) return;

    if(!file.type.startsWith("image/")){
        alert("Solo imágenes");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){
        const base64 = e.target.result;
        document.getElementById("img").src = base64;
        localStorage.setItem("imagenTemp", base64);
    }

    reader.readAsDataURL(file);
});

function subirPost(){

    const texto = document.getElementById("texto").value;
    let imagen = localStorage.getItem("imagenTemp");

    if(!imagen){
        alert("Sube una imagen");
        return;
    }

    const post = {
        id: Date.now(),
        texto: texto,
        imagen: imagen
    };

    let posts = JSON.parse(localStorage.getItem("posts")) || [];
    posts.unshift(post);

    localStorage.setItem("posts", JSON.stringify(posts));
    localStorage.removeItem("imagenTemp");

    window.location.href = "main_web.html";
}
</script>

</body>
</html>
