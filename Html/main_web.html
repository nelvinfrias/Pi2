            <style>

        <script>

            
            let likes = 0;  
            let yaDioLike = false;
            function EnviarComentario(){

let comentario = document.getElementById("textocomentario").value;

if(comentario !== ""){

let nuevoComentario = `
<div class="comentario">

<img src="../img_pb/fondo.jpeg">

<div class="texto-comentario">

<span class="usuario">usuario</span>
<span>${comentario}</span>


</div>

<div onclick="likeComentario(this)" style="cursor:pointer;">♡</div>

</div>
`;

document.getElementById("mostrarComentarios").innerHTML += nuevoComentario;

document.getElementById("textocomentario").value="";

}

}
            function contadorlikes (){

if(!yaDioLike){

likes++;
document.getElementById("cl").innerHTML = likes + " Me gusta";
yaDioLike = true;

}else{

alert("Ya diste like a esta publicación");

}

}
            
            function abrirVentana(){
document.getElementById("ventanaComentarios").style.display="flex";
}
        


function cerrarVentana(){
    document.getElementById("ventanaComentarios").style.display = "none";
}
function likeComentario(corazon){

if(corazon.innerHTML == "♡"){
corazon.innerHTML = "❤️";
}else{
corazon.innerHTML = "♡";
}

}

function responderComentario(boton){
    let respuesta = prompt("Escribe tu respuesta:");

    if(respuesta){
        let contenedor = boton.parentElement.parentElement;

        let nuevaRespuesta = document.createElement("p");
        nuevaRespuesta.innerHTML = "<b>respuesta:</b> " + respuesta;

        contenedor.appendChild(nuevaRespuesta);
    }
}


            window.onclick = function(event) {
    let modal = document.getElementById("ventanaComentarios");
    if (event.target === modal) {
        modal.style.display = "none";
    }
}
function abrirVentana(){
document.getElementById("ventanaComentarios").style.display="flex";
}

function cerrarVentana(){
document.getElementById("ventanaComentarios").style.display="none";
}
function detectarEnter(event){

if(event.key === "Enter"){

event.preventDefault();

EnviarComentario();

}

}               
        </script>
