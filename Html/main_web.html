<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Biblioteca</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<header class="barra-superior">
    <a href="main_web.html"><h1>Library  iBooks.com</h1></a>
    <style>
        .barra-superior a{
            text-decoration: none;
        }

        .barra-superior a h1 {
            display: flex;
        }

        .barra-superior a h1:hover{
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }
    </style>
</header>


<div class="contenedor-principal">

    <aside class="menu-lateral">
        <a href="usuariooficial.html" class="opcion-menu"><i class="fa-solid fa-house"></i> Registrarse</a>
        <a href="perfil.html" class="opcion-menu"><i class="fa-solid fa-user"></i> Perfil</a>
        <a href="acercaDeNosotros.html" class="opcion-menu"><i class="fa-solid fa-book"></i> Acerca de nosotros</a>
        <i onclick="clonar()">Nueva publicacion</i>
    </aside>

    <main class="seccion-publicaciones">
        

    <div class="slider">
        <div class="slides">
            <img src="../imagenes/libro1.jpg" alt="Libro 1">
            <img src="../imagenes/libro2.jpg" alt="Libro 2">
            <img src="../imagenes/libro3.jpg" alt="Libro 3">
            <img src="../imagenes/libro4.jpg" alt="Libro 4">

            <img src="../imagenes/libro1.jpg" alt="Libro 1">
            <img src="../imagenes/libro2.jpg" alt="Libro 2">
            <img src="../imagenes/libro3.jpg" alt="Libro 3">
            <img src="../imagenes/libro4.jpg" alt="Libro 4">
            
            <style>
                * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


.slider {
    width: 100%;
    height: 400px;
    overflow: hidden;
}


.slides {
    display: flex;
    width: 200%;
    animation: mover 12s linear infinite;
}

.slides img {
    width: 100%;
    height: 200px;
}

@keyframes mover {
    from {
        transform: translateX(0);
    }
    to {
        transform: translateX(-50%);
    }
}
            </style>
        </div>
    </div>











    <div class="contructor" id = "contructor">
        <figure>
            <img src="../imagenes/libro5.jpg" alt="" id="imgOriginal">
        </figure>
        <div class="botonSubir">
            <label for="imputSubir" onclick="getimg()">subir</label>
            <input type="file" id="imputSubir">
        </div>
        <div class="textareaConstructor">
        <textarea name="" id="textenviar"></textarea>
        </div>
        <div class="botonefinal">
            <button onclick="enviar()">Publicar</button>
        </div>
    </div>
    

    <div class="contenedorReview" id="contenedorweyyyy">
        <figure>
            <img src="../imagenes/libro4.jpg" alt="" id="imgfinal">
        </figure>
        <div class="texReview">
            <h2>reseña</h2>
            <p id="textrecibido"></p>
        </div>
    </div>
     <style>
        #contructor{
            display: none;
        }
        .contenedorReview{
        }
    </style>
    <script>
        function getimg(){
            const file = document.getElementById("imputSubir");
            file.onchange = () =>{
                imgOriginal.src = URL.createObjectURL(file.files[0])
                
            }
        }
        function enviar(){

            const img1 = document.getElementById("imgOriginal");

            const img2 = document.getElementById("imgfinal");

            img2.src = img1.src

            const text1 = document.getElementById("textenviar");

            const text2 = document.getElementById("textrecibido");
            
            text2.innerText = text1.value;

            const clon = document.getElementById("contructor");
            clon.style.display = "none"
            const original = document.getElementById("contenedorweyyyy");
            const c = original.cloneNode(true)
            document.body.appendChild(c)


        }
        function clonar(){
            const clon = document.getElementById("contructor");
            clon.style.display = "block"
            document.getElementById("textenviar").value = " ";
            document.getElementById("imgOriginal").src = "../imagenes/libro5.jpg";
        }
    </script>















</body>
</html>
