<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Biblioteca</title>

    <link rel="stylesheet" href="estilos.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/tengosueñoxd.css">
</head>
<body>

<header class="header">
    <a href="#" class="logo">ScholarReviews</a>

    <nav class="menu">

        <a href="usuariooficial.html">Iniciar Sesion</a>
        <a href="registro.html">Registrarse</a>
    </nav>

    <div class="search">
        <input type="text" placeholder="Buscar...">
        <i class="fa fa-search"></i>
    </div>

    <button id="toggleTema"><i class="fa-solid fa-moon"></i></button>
</header>

<section class="hero">
    <div class="slides" id="slides">
        <img src="https://covers.openlibrary.org/b/isbn/9780131103627-L.jpg" loading="lazy" alt="C Programming">
        <img src="https://covers.openlibrary.org/b/isbn/9780262033848-L.jpg" loading="lazy" alt="Algorithms">
        <img src="https://covers.openlibrary.org/b/isbn/9780132350884-L.jpg" loading="lazy" alt="Clean Code">
        <img src="https://covers.openlibrary.org/b/isbn/9780201633610-L.jpg" loading="lazy" alt="Design Patterns">
        <img src="https://covers.openlibrary.org/b/isbn/9781491950296-L.jpg" loading="lazy" alt="Fluent Python">
        <img src="https://covers.openlibrary.org/b/isbn/9780262035613-L.jpg" loading="lazy" alt="Deep Learning">
        <img src="https://covers.openlibrary.org/b/isbn/9780135974445-L.jpg" loading="lazy" alt="AI Modern Approach">
        <img src="https://covers.openlibrary.org/b/isbn/9780300209570-L.jpg" loading="lazy" alt="Atlas of AI">
        <img src="https://covers.openlibrary.org/b/isbn/9780131101630-L.jpg" loading="lazy" alt="SICP">
        <img src="https://covers.openlibrary.org/b/isbn/9781491957660-L.jpg" loading="lazy" alt="Python for Data Analysis">
        <img src="https://covers.openlibrary.org/b/isbn/9781492041139-L.jpg" loading="lazy" alt="Data Science from Scratch">
    </div>


    <div class="hero-text">
        <div class="descubre">
                    <h2>Descubre nuevas reseñas</h2>
                        </div>
        <div class="newreview">
                <button onclick="clonar()">Nueva reseña</button>
                <style>
                    .newreview button {
                        font-size: 20px;
                        border-radius: 20px;
                    }

                    .newreview:hover {
                        transform: translateY(-3px);
                        transition: all .4s ease;
                    }
                </style>
        </div>
    </div>
</section>

<div class="layout">

    <aside class="sidebar">
        <a href="#"><i class="fa-solid fa-house"></i> Inicio </a>
        <a href="perfil.html"><i class="fa-solid fa-user"></i> Perfil</a>

         <a href="generos.html"><i class="fa-solid fa-tags"></i> Categorias</a>
        <a href="#"><i class="fa-solid fa-book"></i> Nosotros</a>
    </aside>

    <main class="main">

        <div class="formulario" id="contructor">
            <img src="" id="imgOriginal">

            <label for="imputSubir" onclick="getimg()">Subir imagen</label>
            <input type="file" id="imputSubir">
            
            <input type="text" id="tituloEnviar" placeholder="Título del libro...">
            <input type="text" id="autorEnviar" placeholder="Autor del libro...">
            <input type="url" id="linkEnviar" placeholder="Link del libro (opcional)...">

            <textarea id="textenviar" placeholder="Escribe tu reseña..."></textarea>

            <div class="botons">
                
            <button onclick="enviar()">Publicar</button>
            <button onclick="cancelar()">Cancelar</button>
            </div>
        </div>

        <div class="grid-posts" id="contenedorPosts"></div>

    </main>
</div>

<script>
const slides = document.getElementById("slides");
const images = slides.children;

let index = 0;

function moveSlide() {
    const imgWidth = images[0].offsetWidth + 20; 
    index++;

    if (index >= images.length) {
        index = 0;
        slides.style.transform = `translateX(0px)`;
        return;
    }

    slides.style.transform = `translateX(-${index * imgWidth}px)`;
}

setInterval(moveSlide, 12000);

//local

const btnTema = document.getElementById("toggleTema");

if(localStorage.getItem("tema")){
    document.documentElement.setAttribute("data-theme", localStorage.getItem("tema"));
}

btnTema.addEventListener("click", () => {
    let temaActual = document.documentElement.getAttribute("data-theme");

    if(temaActual === "light"){
        document.documentElement.setAttribute("data-theme", "dark");
        localStorage.setItem("tema", "dark");
    } else {
        document.documentElement.setAttribute("data-theme", "light");
        localStorage.setItem("tema", "light");
    }
});

document.getElementById("imputSubir").addEventListener("change", function(e){

    const archivo = e.target.files[0];
    if(!archivo) return;

    const lector = new FileReader();

    lector.onload = function(event){
        const base64 = event.target.result;

        localStorage.setItem("imagenTemp", base64);

        document.getElementById("imgOriginal").src = base64;
    };

    lector.readAsDataURL(archivo);
});


function enviar(){

    const titulo = document.getElementById("tituloEnviar").value;
    const autor = document.getElementById("autorEnviar").value;
    const link = document.getElementById("linkEnviar").value;
    const texto = document.getElementById("textenviar").value;
    const imagen = localStorage.getItem("imagenTemp");

    if(!titulo || !texto || !imagen || !autor){
        alert("Completa título, autor, texto e imagen");
        return;
    }

    const post = {
        titulo: titulo,
        autor: autor,
        link: link,
        texto: texto,
        imagen: imagen || "../imagenes/libro5.jpg"
    };

    let posts = JSON.parse(localStorage.getItem("posts")) || [];
    posts.unshift(post);

    localStorage.setItem("posts", JSON.stringify(posts));

    localStorage.removeItem("imagenTemp");

    mostrarPosts();

    document.getElementById("contructor").style.display = "none";

    document.getElementById("tituloEnviar").value = "";
    document.getElementById("autorEnviar").value = "";
    document.getElementById("linkEnviar").value = "";
    document.getElementById("textenviar").value = "";
}

function cancelar(){
    document.getElementById("tituloEnviar").value = "";
    document.getElementById("textenviar").value = "";

    localStorage.removeItem("imagenTemp");
    document.getElementById("imgOriginal").src = "../imagenes/libro5.jpg";
    
    document.getElementById("contructor").style.display = "none";
}

function cancelar(){
    if(confirm("¿Cancelar publicación?")){
        document.getElementById("tituloEnviar").value = "";
        document.getElementById("textenviar").value = "";
        localStorage.removeItem("imagenTemp");
        document.getElementById("imgOriginal").src = "../imagenes/libro5.jpg";
        document.getElementById("contructor").style.display = "none";
    }
}


function mostrarPosts(){
    const contenedor = document.getElementById("contenedorPosts");
    contenedor.innerHTML = "";

    const posts = JSON.parse(localStorage.getItem("posts")) || [];

    posts.forEach((post, index) => {
        const div = document.createElement("div");
        div.classList.add("post");

        div.innerHTML = `
            <img src="${post.imagen}">
            <h3>${post.titulo}</h3>
            <p class="autor">Autor: ${post.autor}</p>
            <p class="texto1">${post.texto}</p>

            ${post.link ? `<a href="${post.link}" target="_blank" class="link-libro">
                Link: Ver libro
            </a>` : ""}

            <div class="actions">
                <div>
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-regular fa-comment"></i>
                </div>
            </div>
        `;
        contenedor.appendChild(div);
    });
}


function clonar(){
    document.getElementById("contructor").style.display = "flex";
    document.getElementById("textenviar").value = "";
}


window.onload = mostrarPosts;

</script>

</body>
</html>
