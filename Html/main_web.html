<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Biblioteca</title>


    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/tengosueñoxd.css">
</head>
<div id="modalPublicar" class="modal-publicar">
    <div class="modal-box">

        <h2>Nueva reseña</h2>

        <div class="preview-img">
            <img src="../imagenes/libro5.jpg" id="imgOriginal">
        </div>

        <label for="imputSubir" class="btn-img">
            <i class="fa-solid fa-image"></i> Subir imagen
        </label>
        <input type="file" id="imputSubir">

        <input type="text" id="tituloEnviar" placeholder="Título del libro...">
        <input type="text" id="autorEnviar" placeholder="Autor del libro...">
        <input type="url" id="linkEnviar" placeholder="Link del libro (opcional)...">

        <textarea id="textenviar" placeholder="Escribe tu reseña..."></textarea>

        <div class="botons">
            <button onclick="enviar()">Publicar</button>
            <button onclick="cerrarPublicar()">Cancelar</button>
        </div>

    </div>
</div>
<body>

<header class="header">
    <a href="main_web.html" class="logo">ScholarReviews</a>

    <div class="search">
        <input type="text" placeholder="Buscar...">
        <i class="fa fa-search"></i>
    </div>

    <div class="iconos_line">
        <button onclick="abrirPublicar()">
            <i class="fa-solid fa-pen-to-square"></i> Nueva reseña
            </button>

            <button id="toggleTema"><i class="fa-solid fa-moon"></i></button>

            <button>
                <a href="barraInicio.html"><i class="fa-solid fa-right-from-bracket"></i></i></a>
            </button>
    </div>
</header>

<section class="hero">
    <div class="slides" id="slides">
        <img src="../imagenes/L1.jpeg">
        <img src="../imagenes/L2.jpeg">
        <img src="../imagenes/L3.jpeg">
        <img src="../imagenes/L4.jpeg">
        <img src="../imagenes/L5.jpeg">
        <img src="../imagenes/L6.jpeg">
        <img src="../imagenes/L7.jpeg">
        <img src="../imagenes/L8.jpeg">
        <img src="../imagenes/L9.jpeg">
    </div>


    <div class="hero-text">
        <div class="descubre">
                    <h2>Descubre nuevas reseñas</h2>
                        </div>
                        <style>
                            .descubre:hover{
                                transform: translateY(-5px);
                                transition: all .5s ease;
                            }
                            .hero-text {
                                width: 500px;
                            }
                        </style>
    </div>
</section>

<div class="layout">

    <aside class="sidebar">
        <a href="#"><i class="fa-solid fa-house"></i> Inicio </a>
        <a href="perfil.html"><i class="fa-solid fa-user"></i> Perfil</a>
         <a href="generos.html"><i class="fa-solid fa-tags"></i> Categorias</a>
    </aside>

    <main class="main">

        <div class="formulario" id="contructor">
            <img src="" id="imgOriginal">

            <label for="imputSubir" onclick="getimg()">Subir imagen</label>
            <input type="file" id="imputSubir">
            
            <input type="text" id="tituloEnviar" placeholder="Título del libro...">
            <input type="text" id="autorEnviar" placeholder="Autor del libro...">
            <input type="url" id="linkEnviar" placeholder="Link del libro (opcional)...">

            <textarea id="textenviar" placeholder="Escribe tu reseña..."></textarea>

            <div class="botons">
                
            <button onclick="enviar()">Publicar</button>
            <button onclick="cancelar()">Cancelar</button>
            </div>
        </div>

        <div class="grid-posts" id="contenedorPosts"></div>

    </main>
</div>

<script>
    
const slides = document.getElementById("slides");
const images = slides.children;

let index = 0;

function moveSlide() {
    const imgWidth = images[0].offsetWidth + 20; 
    index++;

    if (index >= images.length) {
        index = 0;
        slides.style.transform = `translateX(0px)`;
        return;
    }

    slides.style.transform = `translateX(-${index * imgWidth}px)`;
}

setInterval(moveSlide, 12000);

//local

const btnTema = document.getElementById("toggleTema");

if(localStorage.getItem("tema")){
    document.documentElement.setAttribute("data-theme", localStorage.getItem("tema"));
}

btnTema.addEventListener("click", () => {
    let temaActual = document.documentElement.getAttribute("data-theme");

    if(temaActual === "light"){
        document.documentElement.setAttribute("data-theme", "dark");
        localStorage.setItem("tema", "dark");
    } else {
        document.documentElement.setAttribute("data-theme", "light");
        localStorage.setItem("tema", "light");
    }
});

document.getElementById("imputSubir").addEventListener("change", function(e){

    const archivo = e.target.files[0];
    if(!archivo) return;

    const lector = new FileReader();

    lector.onload = function(event){
        const base64 = event.target.result;
        document.getElementById("imgOriginal").src = base64;
        localStorage.setItem("imagenTemp", base64);
    };

    lector.readAsDataURL(archivo);
});

function enviar(){

    const titulo = document.getElementById("tituloEnviar").value;
    const autor = document.getElementById("autorEnviar").value;
    const link = document.getElementById("linkEnviar").value;
    const texto = document.getElementById("textenviar").value;
    const imagen = localStorage.getItem("imagenTemp");

    if(!titulo || !texto || !imagen || !autor){
        alert("Completa título, autor, texto e imagen");
        return;
    }

    const post = {
        titulo: titulo,
        autor: autor,      
        link: link,  
        texto: texto,
        imagen: imagen || "../imagenes/libro5.jpg",
        comentarios: [],
        likes: 0,
        usuariosLike: []
    };

    let posts = JSON.parse(localStorage.getItem("posts")) || [];
    posts.unshift(post);

    localStorage.setItem("posts", JSON.stringify(posts));
    localStorage.removeItem("imagenTemp");

    mostrarPosts();
    cerrarPublicar();
}

function cancelar(){
    document.getElementById("tituloEnviar").value = "";
    document.getElementById("textenviar").value = "";

    localStorage.removeItem("imagenTemp");
    document.getElementById("imgOriginal").src = "../imagenes/libro5.jpg";
    
    document.getElementById("contructor").style.display = "none";
}

function cancelar(){
    if(confirm("¿Cancelar publicación?")){
        document.getElementById("tituloEnviar").value = "";
        document.getElementById("textenviar").value = "";
        localStorage.removeItem("imagenTemp");
        document.getElementById("imgOriginal").src = "../imagenes/libro5.jpg";
        document.getElementById("contructor").style.display = "none";
    }
}


function mostrarPosts(){
    const contenedor = document.getElementById("contenedorPosts");
    contenedor.innerHTML = "";

    const posts = JSON.parse(localStorage.getItem("posts")) || [];

    posts.forEach((post, index) => {
        const div = document.createElement("div");
        div.classList.add("post");

        div.innerHTML = `
            <img src="${post.imagen}">
            <h3>${post.titulo}</h3>
            <p class="autor">Autor: ${post.autor}</p>
            <p class="texto1">${post.texto}</p>

            ${post.link ? `<a href="${post.link}" target="_blank" class="link-libro">
                Link: Ver libro
            </a>` : ""}

            <div class="actions">

<div>
<i class="${post.usuariosLike && post.usuariosLike.includes(usuarioActual) ? 'fa-solid liked' : 'fa-regular'} fa-heart" onclick="darLike(${index}, this)"></i>
<span>${post.likes || 0}</span>

<i class="fa-regular fa-comment" onclick="abrirModal(${index})"></i>
</div>
</div>
        `;
        contenedor.appendChild(div);
    });
}


function clonar(){
    document.getElementById("contructor").style.display = "flex";
    document.getElementById("textenviar").value = "";
}


window.onload = mostrarPosts;

let postActual = null;
let usuarioActual = "usuario1";

function abrirModal(index){
    postActual = index;
    document.getElementById("modalComentarios").style.display = "flex";
    mostrarComentarios();
}

function cerrarModal(){
    document.getElementById("modalComentarios").style.display = "none";
}

function mostrarComentarios(){
    const posts = JSON.parse(localStorage.getItem("posts")) || [];
    const comentarios = posts[postActual].comentarios || [];

    const lista = document.getElementById("listaComentarios");
    lista.innerHTML = "";

    comentarios.forEach(c => {
        const p = document.createElement("p");
        p.textContent = c;
        lista.appendChild(p);
    });
}

function agregarComentario(){
    const texto = document.getElementById("nuevoComentario").value;

    if(!texto) return;

    let posts = JSON.parse(localStorage.getItem("posts")) || [];

    posts[postActual].comentarios.push(texto);

    localStorage.setItem("posts", JSON.stringify(posts));

    document.getElementById("nuevoComentario").value = "";

    mostrarComentarios();
}

function detectarEnter(e){
    if(e.key === "Enter"){
        e.preventDefault();
        agregarComentario();
    }
}


function darLike(index){

    let posts = JSON.parse(localStorage.getItem("posts")) || [];
    let post = posts[index];

    if(!post.likes) post.likes = 0;
    if(!post.usuariosLike) post.usuariosLike = [];

    if(post.usuariosLike.includes(usuarioActual)){
        return;
    }

    post.likes++;
    post.usuariosLike.push(usuarioActual);

    localStorage.setItem("posts", JSON.stringify(posts));

    mostrarPosts();
}

function abrirPublicar(){
    document.getElementById("modalPublicar").style.display = "flex";
}

function cerrarPublicar(){
    document.getElementById("modalPublicar").style.display = "none";

    document.getElementById("tituloEnviar").value = "";
    document.getElementById("autorEnviar").value = "";
    document.getElementById("linkEnviar").value = "";
    document.getElementById("textenviar").value = "";

    localStorage.removeItem("imagenTemp");
    document.getElementById("imgOriginal").src = "../imagenes/libro5.jpg";
}


</script>

<div id="modalComentarios" class="modal">
    <div class="modal-contenido">
        <span class="cerrar" onclick="cerrarModal()">&times;</span>

        <h3>Comentarios</h3>

        <div id="listaComentarios"></div>

        <textarea id="nuevoComentario" 
        placeholder="Escribe un comentario..."
        onkeypress="detectarEnter(event)"></textarea>

        <button onclick="agregarComentario()">Comentar</button>
    </div>
</div>
</body>
</html>
